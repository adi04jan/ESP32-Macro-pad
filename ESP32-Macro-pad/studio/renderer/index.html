<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;
  font-src https://fonts.gstatic.com https://unpkg.com data:;
  img-src 'self' data:;
  connect-src 'self';" />
<title>Macropad Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script>
  (function () {
    function on() { document.documentElement.classList.add("anim-on"); }
    if (document.visibilityState === "visible") requestAnimationFrame(on);
    else document.addEventListener("visibilitychange", function h() {
      if (document.visibilityState === "visible") { on(); document.removeEventListener("visibilitychange", h); }
    });
  })();
</script>

<!-- Vendored runtime (offline) -->
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>

<!-- Pre-transformed renderer (built by build.js) -->
<script src="build/data.js"></script>
<script src="build/ui.js"></script>
<script src="build/ActionBuilder.js"></script>
<script src="build/KeyEditor.js"></script>
<script src="build/Dashboard.js"></script>
<script src="build/AutoSwitcher.js"></script>
<script src="build/Settings.js"></script>
<script src="build/Widget.js"></script>
<script src="build/CommandPalette.js"></script>
<script src="build/App.js"></script>
</body>
</html>
